<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TML Intel — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #ece8df; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .logo { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: #888; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    input { width: 100%; background: #111; border: 1px solid #222; border-radius: 8px; color: #ece8df; font-size: 14px; padding: 11px 14px; outline: none; margin-bottom: 12px; }
    input:focus { border-color: #f5a623; }
    .btn { width: 100%; background: #f5a623; color: #080808; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; padding: 12px; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; text-align: center; padding: 12px; border-radius: 8px; display: none; }
    .msg.error { background: #1c0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .notice { margin-top: 24px; font-size: 12px; color: #555; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TML Intel</div>
    <div class="sub">Sign in to access your data</div>
    <form id="form">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
      <button class="btn" id="btn" type="submit">Sign in</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="notice">Access is by invitation only</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://hwceecnfjvbscosyknyg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3Y2VlY25manZic2Nvc3lrbnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkxMDIsImV4cCI6MjA5MDY3NTEwMn0.wYu4HGnpPlH4Iecht57kgv2I7YJQb_UpFsuA6C7vnnw';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.replace('upload.html');
    });

    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = 'Invalid email or password.';
        msg.className = 'msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      } else {
        window.location.replace('upload.html');
      }
    });
  </script>
</body>
</html>
