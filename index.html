<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TML Intel — Projects</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #ece8df; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
    .logo { font-size: 22px; font-weight: 700; color: #f5a623; }
    .logout { background: none; border: 1px solid #222; color: #888; font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .logout:hover { border-color: #f87171; color: #f87171; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { color: #666; font-size: 14px; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .new-card { background: none; border: 2px dashed #222; border-radius: 14px; padding: 32px 24px; cursor: pointer; text-align: center; color: #555; transition: all 0.2s; width: 100%; }
    .new-card:hover { border-color: #f5a623; color: #f5a623; }
    .new-card .plus { font-size: 32px; margin-bottom: 8px; }
    .new-card .label { font-size: 14px; font-weight: 500; }
    .project-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 14px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; text-align: left; }
    .project-card:hover { border-color: #333; transform: translateY(-2px); }
    .project-icon { font-size: 28px; margin-bottom: 14px; }
    .project-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .project-desc { font-size: 13px; color: #666; margin-bottom: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-meta { font-size: 12px; color: #555; display: flex; justify-content: space-between; }
    .project-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
    .project-card:hover .project-actions { opacity: 1; }
    .action-btn { background: none; border: 1px solid #222; color: #666; font-size: 12px; padding: 3px 8px; border-radius: 5px; cursor: pointer; }
    .action-btn:hover { border-color: #f87171; color: #f87171; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid #222; border-radius: 16px; padding: 28px; width: 380px; }
    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .modal label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    .modal input, .modal textarea { width: 100%; background: #080808; border: 1px solid #222; color: #ece8df; font-size: 14px; padding: 10px 12px; border-radius: 8px; outline: none; margin-bottom: 14px; font-family: inherit; }
    .modal input:focus, .modal textarea:focus { border-color: #f5a623; }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary { background: #f5a623; color: #080808; }
    .btn-cancel { background: #1a1a1a; color: #888; }
    .empty { color: #555; text-align: center; padding: 60px 0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">TML Intel</div>
      <button class="logout" id="logoutBtn">Sign out</button>
    </div>
    <div class="page-title">Projects</div>
    <div class="page-sub">Each project has its own files, uploads and chat.</div>
    <div class="grid" id="grid">
      <button class="new-card" id="newBtn">
        <div class="plus">+</div>
        <div class="label">New Project</div>
      </button>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">New Project</h2>
      <label>Project name</label>
      <input type="text" id="projName" placeholder="e.g. Q1 Sales Analysis" />
      <label>Description (optional)</label>
      <textarea id="projDesc" placeholder="What is this project about?"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-primary" id="modalSave">Create Project</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://hwceecnfjvbscosyknyg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3Y2VlY25manZic2Nvc3lrbnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkxMDIsImV4cCI6MjA5MDY3NTEwMn0.wYu4HGnpPlH4Iecht57kgv2I7YJQb_UpFsuA6C7vnnw';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editingId = null;

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.replace('login.html'); return; }
      loadProjects();
    })();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await sb.auth.signOut(); window.location.replace('login.html');
    });

    async function loadProjects() {
      const { data: projects } = await sb.from('projects').select('*').order('created_at');
      const { data: counts } = await sb.from('documents').select('project_id');
      const countMap = {};
      (counts || []).forEach(d => { countMap[d.project_id] = (countMap[d.project_id] || 0) + 1; });

      const grid = document.getElementById('grid');
      const icons = ['📊','📈','📉','🗂️','📋','📌','🔍','💡'];
      const cards = (projects || []).map((p, i) => `
        <div class="project-card" onclick="openProject('${p.id}')">
          <div class="project-actions">
            <button class="action-btn" onclick="event.stopPropagation(); editProject('${p.id}','${p.name.replace(/'/g,"\\'")}','${(p.description||'').replace(/'/g,"\\'")}')">Edit</button>
            <button class="action-btn" onclick="event.stopPropagation(); deleteProject('${p.id}')">Delete</button>
          </div>
          <div class="project-icon">${icons[i % icons.length]}</div>
          <div class="project-name">${p.name}</div>
          <div class="project-desc">${p.description || 'No description'}</div>
          <div class="project-meta">
            <span>${countMap[p.id] || 0} file${countMap[p.id] !== 1 ? 's' : ''}</span>
            <span>${new Date(p.created_at).toLocaleDateString()}</span>
          </div>
        </div>`).join('');

      grid.innerHTML = `
        <button class="new-card" id="newBtn">
          <div class="plus">+</div>
          <div class="label">New Project</div>
        </button>
        ${cards}`;
      document.getElementById('newBtn').addEventListener('click', () => openModal());
    }

    function openProject(id) { window.location.href = `upload.html?project=${id}`; }

    function openModal(id = null, name = '', desc = '') {
      editingId = id;
      document.getElementById('modalTitle').textContent = id ? 'Edit Project' : 'New Project';
      document.getElementById('modalSave').textContent = id ? 'Save Changes' : 'Create Project';
      document.getElementById('projName').value = name;
      document.getElementById('projDesc').value = desc;
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('projName').focus(), 50);
    }

    function editProject(id, name, desc) { openModal(id, name, desc); }

    document.getElementById('modalCancel').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('open'); editingId = null;
    });

    document.getElementById('modalSave').addEventListener('click', async () => {
      const name = document.getElementById('projName').value.trim();
      const description = document.getElementById('projDesc').value.trim();
      if (!name) return;
      if (editingId) {
        await sb.from('projects').update({ name, description }).eq('id', editingId);
      } else {
        await sb.from('projects').insert({ name, description });
      }
      document.getElementById('modalOverlay').classList.remove('open');
      editingId = null;
      loadProjects();
    });

    document.getElementById('projName').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('modalSave').click();
    });

    async function deleteProject(id) {
      if (!confirm('Delete this project and all its files?')) return;
      await sb.from('projects').delete().eq('id', id);
      loadProjects();
    }
  </script>
</body>
</html>
