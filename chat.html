<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TML Intel — Chat</title>
  <script src="<https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2>"></script>
  <script src="<https://cdn.jsdelivr.net/npm/chart.js>"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #ece8df; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { padding: 12px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
    h1 { font-size: 18px; font-weight: 700; color: #f5a623; margin-right: 4px; }
    .nav a { color: #888; font-size: 13px; text-decoration: none; padding: 5px 10px; border: 1px solid #222; border-radius: 6px; }
    .nav a:hover { color: #f5a623; border-color: #f5a623; }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .btn-sm { background: none; border: 1px solid #222; color: #888; font-size: 13px; padding: 5px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { border-color: #f5a623; color: #f5a623; }
    .btn-sm.danger:hover { border-color: #f87171; color: #f87171; }
    .btn-sm.active { border-color: #f5a623; color: #f5a623; background: #1a1200; }

    /* File picker */
    .picker-bar { padding: 10px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; position: relative; }
    .picker-wrap { position: relative; }
    .picker-btn { background: #111; border: 1px solid #333; color: #ece8df; font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .picker-btn:hover { border-color: #f5a623; }
    .picker-dropdown { position: absolute; top: calc(100% + 6px); left: 0; background: #111; border: 1px solid #333; border-radius: 10px; padding: 8px; min-width: 260px; z-index: 100; max-height: 260px; overflow-y: auto; }
    .picker-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .picker-item:hover { background: #1a1a1a; }
    .picker-item input[type="checkbox"] { accent-color: #f5a623; width: 15px; height: 15px; flex-shrink: 0; }
    .picker-item label { cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .picker-empty { color: #555; font-size: 13px; padding: 10px; text-align: center; }
    .selected-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: #1a1200; border: 1px solid #f5a623; color: #f5a623; font-size: 12px; padding: 3px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
    .tag button { background: none; border: none; color: #f5a623; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
    .join-hint { background: #111; border: 1px solid #222; color: #ece8df; font-size: 13px; padding: 7px 12px; border-radius: 8px; outline: none; flex: 1; min-width: 200px; }
    .join-hint:focus { border-color: #f5a623; }
    .join-hint::placeholder { color: #555; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .welcome { text-align: center; padding: 40px 20px; color: #555; }
    .welcome h2 { font-size: 18px; color: #888; margin-bottom: 8px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .suggestion { background: #111; border: 1px solid #222; border-radius: 8px; padding: 7px 14px; font-size: 13px; color: #888; cursor: pointer; }
    .suggestion:hover { border-color: #f5a623; color: #f5a623; }
    .msg { display: flex; flex-direction: column; gap: 8px; max-width: 820px; width: 100%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 11px 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; max-width: 640px; }
    .msg.user .bubble { background: #f5a623; color: #080808; border-radius: 12px 12px 2px 12px; }
    .msg.assistant .bubble { background: #111; border: 1px solid #1a1a1a; border-radius: 12px 12px 12px 2px; }
    .msg-actions { display: flex; gap: 6px; }
    .action-btn { background: none; border: 1px solid #222; color: #666; font-size: 11px; padding: 3px 10px; border-radius: 6px; cursor: pointer; }
    .action-btn:hover { border-color: #f5a623; color: #f5a623; }
    .action-btn.csv:hover { border-color: #4ade80; color: #4ade80; }
    .action-btn.saved { border-color: #4ade80; color: #4ade80; }
    .chart-wrap { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; padding: 18px; width: 100%; max-width: 560px; }
    .chart-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 14px; }
    .table-wrap { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; max-width: 640px; width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #111; color: #888; font-weight: 600; padding: 9px 13px; text-align: left; border-bottom: 1px solid #1a1a1a; white-space: nowrap; }
    td { padding: 8px 13px; border-bottom: 1px solid #0d0d0d; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #111; }
    .thinking { display: flex; gap: 4px; padding: 13px 15px; background: #111; border: 1px solid #1a1a1a; border-radius: 12px; }
    .dot { width: 6px; height: 6px; background: #555; border-radius: 50%; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

    /* Input */
    .input-area { padding: 14px 20px; border-top: 1px solid #1a1a1a; display: flex; gap: 8px; flex-shrink: 0; }
    .input-wrap { flex: 1; background: #111; border: 1px solid #222; border-radius: 10px; display: flex; align-items: center; padding: 0 12px; }
    input[type="text"] { flex: 1; background: none; border: none; outline: none; color: #ece8df; font-size: 14px; padding: 11px 0; }
    input[type="text"]::placeholder { color: #555; }
    input:disabled { opacity: 0.5; }
    .send-btn { background: #f5a623; color: #080808; border: none; border-radius: 8px; width: 40px; height: 40px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Insights panel */
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
    .panel-overlay.open { display: block; }
    .insights-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 380px; max-width: 95vw; background: #0d0d0d; border-left: 1px solid #1a1a1a; z-index: 201; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; }
    .insights-panel.open { transform: translateX(0); }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
    .panel-header h2 { font-size: 16px; font-weight: 600; }
    .panel-close { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; line-height: 1; }
    .panel-close:hover { color: #ece8df; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .insight-card { background: #111; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; cursor: pointer; }
    .insight-card:hover { border-color: #333; }
    .insight-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .insight-meta { font-size: 11px; color: #555; display: flex; justify-content: space-between; align-items: center; }
    .insight-q { font-size: 12px; color: #888; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .insight-del { background: none; border: none; color: #555; cursor: pointer; font-size: 16px; padding: 0 4px; }
    .insight-del:hover { color: #f87171; }
    .panel-empty { color: #555; font-size: 13px; text-align: center; padding: 40px 20px; }

    /* Save modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid #222; border-radius: 14px; padding: 24px; width: 340px; }
    .modal h3 { font-size: 16px; margin-bottom: 16px; }
    .modal input { width: 100%; background: #080808; border: 1px solid #222; color: #ece8df; font-size: 14px; padding: 10px 12px; border-radius: 8px; outline: none; margin-bottom: 12px; }
    .modal input:focus { border-color: #f5a623; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
    .modal-save { background: #f5a623; color: #080808; }
    .modal-cancel { background: #1a1a1a; color: #888; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>TML Intel</h1>
    <nav class="nav"><a href="upload.html">← Upload</a></nav>
    <div class="header-right">
      <button class="btn-sm" id="insightsBtn">📚 Saved Insights</button>
      <button class="btn-sm danger" id="logoutBtn">Sign out</button>
    </div>
  </div>

  <!-- File picker bar -->
  <div class="picker-bar">
    <div class="picker-wrap">
      <button class="picker-btn" id="pickerBtn">📁 Select files ▾</button>
      <div class="picker-dropdown" id="pickerDropdown" style="display:none">
        <div id="pickerList"><div class="picker-empty">Loading files…</div></div>
      </div>
    </div>
    <div class="selected-tags" id="selectedTags"></div>
    <input class="join-hint" id="joinHint" type="text" placeholder="Join hint (optional): e.g. join on Customer ID" style="display:none" />
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Select one or more files to get started</h2>
      <p>You can select multiple files and ask questions across all of them</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="input" placeholder="Ask a question about your data…" disabled />
    </div>
    <button class="send-btn" id="sendBtn" disabled>↑</button>
  </div>

  <!-- Insights panel -->
  <div class="panel-overlay" id="panelOverlay"></div>
  <div class="insights-panel" id="insightsPanel">
    <div class="panel-header">
      <h2>📚 Saved Insights</h2>
      <button class="panel-close" id="panelClose">×</button>
    </div>
    <div class="panel-body" id="panelBody">
      <div class="panel-empty">No saved insights yet.<br>Save a response using the 💾 button.</div>
    </div>
  </div>

  <!-- Save modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Save Insight</h3>
      <input type="text" id="insightTitle" placeholder="Title for this insight…" />
      <div class="modal-btns">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = '<https://hwceecnfjvbscosyknyg.supabase.co>';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3Y2VlY25manZic2Nvc3lrbnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkxMDIsImV4cCI6MjA5MDY3NTEwMn0.wYu4HGnpPlH4Iecht57kgv2I7YJQb_UpFsuA6C7vnnw';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let token = null;
    let allFiles = [];
    let selectedIds = new Set();
    let charts = {};
    let pendingSave = null;

    // Pre-select from URL param
    const urlDoc = new URLSearchParams(location.search).get('doc');
    if (urlDoc) selectedIds.add(urlDoc);

    // Auth
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.replace('login.html'); return; }
      token = session.access_token;
      await loadFiles();
      await loadInsights();
      if (selectedIds.size) { renderTags(); enableChat(); showWelcomeForFiles(); }
    })();

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await sb.auth.signOut(); window.location.replace('login.html');
    });

    // Load processed files
    async function loadFiles() {
      const { data } = await sb.from('documents').select('id, name').eq('status', 'processed').order('created_at', { ascending: false });
      allFiles = data || [];
      renderPickerList();
    }

    function renderPickerList() {
      const list = document.getElementById('pickerList');
      if (!allFiles.length) { list.innerHTML = '<div class="picker-empty">No processed files yet</div>'; return; }
      list.innerHTML = allFiles.map(f => `
        <div class="picker-item" onclick="toggleFile('${<f.id>}', '${f.name.replace(/'/g,"\\'")}')">
          <input type="checkbox" id="chk_${<f.id>}" ${selectedIds.has(<f.id>) ? 'checked' : ''} onclick="event.stopPropagation()" onchange="toggleFile('${<f.id>}', '${f.name.replace(/'/g,"\\'")}')">
          <label for="chk_${<f.id>}" title="${f.name}">${f.name}</label>
        </div>`).join('');
    }

    function toggleFile(id, name) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      document.getElementById('chk_' + id) && (document.getElementById('chk_' + id).checked = selectedIds.has(id));
      renderTags();
      if (selectedIds.size) { enableChat(); showWelcomeForFiles(); }
      else { disableChat(); }
      document.getElementById('joinHint').style.display = selectedIds.size > 1 ? 'block' : 'none';
    }

    function renderTags() {
      document.getElementById('selectedTags').innerHTML = [...selectedIds].map(id => {
        const f = allFiles.find(x => <x.id> === id);
        return f ? `<div class="tag">${f.name}<button onclick="toggleFile('${<f.id>}','${f.name.replace(/'/g,"\\'")}')">×</button></div>` : '';
      }).join('');
    }

    // Picker dropdown toggle
    const pickerBtn = document.getElementById('pickerBtn');
    const pickerDropdown = document.getElementById('pickerDropdown');
    pickerBtn.addEventListener('click', e => { e.stopPropagation(); pickerDropdown.style.display = pickerDropdown.style.display === 'none' ? 'block' : 'none'; });
    document.addEventListener('click', e => { if (!document.getElementById('pickerWrap')?.contains(e.target)) pickerDropdown.style.display = 'none'; });
    document.querySelector('.picker-wrap').addEventListener('click', e => e.stopPropagation());

    function enableChat() { document.getElementById('input').disabled = false; document.getElementById('sendBtn').disabled = false; }
    function disableChat() { document.getElementById('input').disabled = true; document.getElementById('sendBtn').disabled = true; }

    function showWelcomeForFiles() {
      const names = [...selectedIds].map(id => allFiles.find(f => <f.id> === id)?.name).filter(Boolean);
      document.getElementById('messages').innerHTML = `
        <div class="welcome">
          <h2>Chatting with: ${names.join(' + ')}</h2>
          ${names.length > 1 ? '<p style="color:#666;font-size:13px;margin-top:4px">Tip: Add a join hint above if the files share a common column</p>' : ''}
          <div class="suggestions" style="margin-top:16px">
            <div class="suggestion" onclick="ask('Give me a summary of this data')">Summary</div>
            <div class="suggestion" onclick="ask('What are the top 10 rows by value?')">Top 10</div>
            <div class="suggestion" onclick="ask('Show me a bar chart')">Bar chart</div>
            <div class="suggestion" onclick="ask('What are the key trends?')">Key trends</div>
            ${names.length > 1 ? '<div class="suggestion" onclick="ask(\'Join the tables and show me a combined view\')">Join tables</div>' : ''}
            <div class="suggestion" onclick="ask('What recommendations do you have?')">Recommendations</div>
          </div>
        </div>`;
    }

    function ask(q) { document.getElementById('input').value = q; send(); }

    document.getElementById('sendBtn').addEventListener('click', send);
    document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) send(); });

    async function send() {
      const input = document.getElementById('input');
      const q = input.value.trim();
      if (!q || !selectedIds.size) return;
      pickerDropdown.style.display = 'none';
      input.value = '';
      document.getElementById('sendBtn').disabled = true;

      addUserMsg(q);
      const thinking = addThinking();

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/query-data`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            document_ids: [...selectedIds],
            question: q,
            join_hint: document.getElementById('joinHint').value.trim() || undefined
          })
        });
        const data = await res.json();
        thinking.remove();
        renderResponse(q, data);
      } catch(e) {
        thinking.remove();
        addAssistantMsg('Something went wrong. Please try again.');
      }
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    function addUserMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg user';
      div.innerHTML = `<div class="bubble">${text}</div>`;
      document.getElementById('messages').appendChild(div);
      scrollBottom();
    }

    function addAssistantMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = `<div class="bubble">${text}</div>`;
      document.getElementById('messages').appendChild(div);
      scrollBottom();
    }

    function addThinking() {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      document.getElementById('messages').appendChild(div);
      scrollBottom();
      return div;
    }

    function renderResponse(question, data) {
      if (data.error) { addAssistantMsg(`Error: ${data.error}`); return; }

      const div = document.createElement('div');
      div.className = 'msg assistant';
      let html = '';

      if (data.answer) html += `<div class="bubble">${data.answer}</div>`;

      const hasChart = data.chart?.type;
      const hasTable = data.table?.headers;
      const chartId = 'c' + Math.random().toString(36).slice(2);

      if (hasChart) {
        html += `<div class="chart-wrap"><div class="chart-title">${data.chart.title || ''}</div><canvas id="${chartId}"></canvas></div>`;
      }

      if (hasTable) {
        html += `<div class="table-wrap"><table>
          <thead><tr>${data.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${data.table.rows.map(r => `<tr>${r.map(c => `<td>${c ?? ''}</td>`).join('')}</tr>`).join('')}</tbody>
        </table></div>`;
      }

      // Action buttons
      const saveId = 'save_' + Math.random().toString(36).slice(2);
      html += `<div class="msg-actions">
        <button class="action-btn" id="${saveId}" onclick="openSaveModal(this, '${question.replace(/'/g,"\\'")}', ${JSON.stringify(JSON.stringify(data))})">💾 Save</button>
        ${hasTable ? `<button class="action-btn csv" onclick="exportCSV(${JSON.stringify(JSON.stringify(data.table))})">⬇ Export CSV</button>` : ''}
      </div>`;

      div.innerHTML = html;
      document.getElementById('messages').appendChild(div);
      scrollBottom();

      if (hasChart) {
        const colors = ['#f5a623','#60a5fa','#4ade80','#f87171','#c084fc','#2dd4bf','#fb923c','#a78bfa'];
        if (charts[chartId]) charts[chartId].destroy();
        charts[chartId] = new Chart(document.getElementById(chartId), {
          type: data.chart.type,
          data: {
            labels: data.chart.labels,
            datasets: [{ data: data.chart.values, backgroundColor: colors, borderColor: data.chart.type === 'line' ? '#f5a623' : colors, borderWidth: data.chart.type === 'line' ? 2 : 1, tension: 0.4, fill: false }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: data.chart.type === 'pie', labels: { color: '#888' } } },
            scales: data.chart.type !== 'pie' ? { x: { ticks: { color: '#888' }, grid: { color: '#1a1a1a' } }, y: { ticks: { color: '#888' }, grid: { color: '#1a1a1a' } } } : {}
          }
        });
      }
    }

    // Export CSV
    function exportCSV(tableJson) {
      const table = JSON.parse(tableJson);
      const rows = [table.headers, ...table.rows];
      const csv = rows.map(r => r.map(c => `"${String(c ?? '').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `insight_${Date.now()}.csv`; a.click();
    }

    // Save modal
    let savePayload = null;
    function openSaveModal(btn, question, dataJson) {
      savePayload = { btn, question, data: JSON.parse(dataJson) };
      document.getElementById('insightTitle').value = question.slice(0, 60);
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('insightTitle').select(), 50);
    }
    document.getElementById('modalCancel').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('open'); savePayload = null;
    });
    document.getElementById('modalSave').addEventListener('click', async () => {
      const title = document.getElementById('insightTitle').value.trim();
      if (!title || !savePayload) return;
      const { btn, question, data } = savePayload;
      const names = [...selectedIds].map(id => allFiles.find(f => <f.id> === id)?.name).filter(Boolean);
      await sb.from('saved_insights').insert({
        title, question,
        answer: data.answer || null,
        chart: data.chart || null,
        table_data: data.table || null,
        document_ids: [...selectedIds],
        document_names: names
      });
      btn.textContent = '✓ Saved'; btn.classList.add('saved'); btn.onclick = null;
      document.getElementById('modalOverlay').classList.remove('open');
      savePayload = null;
      await loadInsights();
    });

    // Insights panel
    document.getElementById('insightsBtn').addEventListener('click', () => {
      document.getElementById('insightsPanel').classList.add('open');
      document.getElementById('panelOverlay').classList.add('open');
    });
    document.getElementById('panelClose').addEventListener('click', closePanel);
    document.getElementById('panelOverlay').addEventListener('click', closePanel);
    function closePanel() {
      document.getElementById('insightsPanel').classList.remove('open');
      document.getElementById('panelOverlay').classList.remove('open');
    }

    async function loadInsights() {
      const { data } = await sb.from('saved_insights').select('*').order('created_at', { ascending: false });
      const body = document.getElementById('panelBody');
      if (!data?.length) { body.innerHTML = '<div class="panel-empty">No saved insights yet.<br>Save a response using the 💾 button.</div>'; return; }
      body.innerHTML = data.map(ins => `
        <div class="insight-card" onclick="replayInsight(${JSON.stringify(JSON.stringify(ins))})">
          <div class="insight-title">${ins.title}</div>
          <div class="insight-q">${ins.question}</div>
          <div class="insight-meta">
            <span>${ins.document_names?.join(' + ') || ''}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <span>${new Date(ins.created_at).toLocaleDateString()}</span>
              <button class="insight-del" onclick="event.stopPropagation();deleteInsight('${<ins.id>}')">×</button>
            </div>
          </div>
        </div>`).join('');
    }

    function replayInsight(insJson) {
      const ins = JSON.parse(insJson);
      closePanel();
      document.getElementById('messages').innerHTML = '';
      addUserMsg(ins.question);
      renderResponse(ins.question, { answer: ins.answer, chart: ins.chart, table: ins.table_data });
    }

    async function deleteInsight(id) {
      await sb.from('saved_insights').delete().eq('id', id);
      await loadInsights();
    }

    function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
  </script>
</body>
</html>
