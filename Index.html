<!DOCTYPE html>
2	<html lang="en">
3	<head>
4	  <meta charset="UTF-8" />
5	  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
6	  <title>TML Intel — Projects</title>
7	  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
8	  <style>
9	    * { box-sizing: border-box; margin: 0; padding: 0; }
10	    body { background: #080808; color: #ece8df; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; min-height: 100vh; padding: 40px 20px; }
11	    .container { max-width: 900px; margin: 0 auto; }
12	    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
13	    .logo { font-size: 22px; font-weight: 700; color: #f5a623; }
14	    .logout { background: none; border: 1px solid #222; color: #888; font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
15	    .logout:hover { border-color: #f87171; color: #f87171; }
16	    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
17	    .page-sub { color: #666; font-size: 14px; margin-bottom: 32px; }
18	    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
19	    .new-card { background: none; border: 2px dashed #222; border-radius: 14px; padding: 32px 24px; cursor: pointer; text-align: center; color: #555; transition: all 0.2s; width: 100%; }
20	    .new-card:hover { border-color: #f5a623; color: #f5a623; }
21	    .new-card .plus { font-size: 32px; margin-bottom: 8px; }
22	    .new-card .label { font-size: 14px; font-weight: 500; }
23	    .project-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 14px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; text-align: left; }
24	    .project-card:hover { border-color: #333; transform: translateY(-2px); }
25	    .project-icon { font-size: 28px; margin-bottom: 14px; }
26	    .project-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
27	    .project-desc { font-size: 13px; color: #666; margin-bottom: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
28	    .project-meta { font-size: 12px; color: #555; display: flex; justify-content: space-between; }
29	    .project-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; opacity: 0; transition: opacity 0.2s; }
30	    .project-card:hover .project-actions { opacity: 1; }
31	    .action-btn { background: none; border: 1px solid #222; color: #666; font-size: 12px; padding: 3px 8px; border-radius: 5px; cursor: pointer; }
32	    .action-btn:hover { border-color: #f87171; color: #f87171; }
33	    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
34	    .modal-overlay.open { display: flex; }
35	    .modal { background: #111; border: 1px solid #222; border-radius: 16px; padding: 28px; width: 380px; }
36	    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
37	    .modal label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
38	    .modal input, .modal textarea { width: 100%; background: #080808; border: 1px solid #222; color: #ece8df; font-size: 14px; padding: 10px 12px; border-radius: 8px; outline: none; margin-bottom: 14px; font-family: inherit; }
39	    .modal input:focus, .modal textarea:focus { border-color: #f5a623; }
40	    .modal textarea { resize: vertical; min-height: 70px; }
41	    .modal-btns { display: flex; gap: 8px; }
42	    .modal-btns button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
43	    .btn-primary { background: #f5a623; color: #080808; }
44	    .btn-cancel { background: #1a1a1a; color: #888; }
45	    .empty { color: #555; text-align: center; padding: 60px 0; font-size: 14px; }
46	  </style>
47	</head>
48	<body>
49	  <div class="container">
50	    <div class="header">
51	      <div class="logo">TML Intel</div>
52	      <button class="logout" id="logoutBtn">Sign out</button>
53	    </div>
54	    <div class="page-title">Projects</div>
55	    <div class="page-sub">Each project has its own files, uploads and chat.</div>
56	    <div class="grid" id="grid">
57	      <button class="new-card" id="newBtn">
58	        <div class="plus">+</div>
59	        <div class="label">New Project</div>
60	      </button>
61	    </div>
62	  </div>
63	
64	  <!-- Create/Edit Modal -->
65	  <div class="modal-overlay" id="modalOverlay">
66	    <div class="modal">
67	      <h2 id="modalTitle">New Project</h2>
68	      <label>Project name</label>
69	      <input type="text" id="projName" placeholder="e.g. Q1 Sales Analysis" />
70	      <label>Description (optional)</label>
71	      <textarea id="projDesc" placeholder="What is this project about?"></textarea>
72	      <div class="modal-btns">
73	        <button class="btn-cancel" id="modalCancel">Cancel</button>
74	        <button class="btn-primary" id="modalSave">Create Project</button>
75	      </div>
76	    </div>
77	  </div>
78	
79	  <script>
80	    const SUPABASE_URL = 'https://hwceecnfjvbscosyknyg.supabase.co';
81	    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3Y2VlY25manZic2Nvc3lrbnlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwOTkxMDIsImV4cCI6MjA5MDY3NTEwMn0.wYu4HGnpPlH4Iecht57kgv2I7YJQb_UpFsuA6C7vnnw';
82	    const { createClient } = window.supabase;
83	    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
84	
85	    let editingId = null;
86	
87	    (async () => {
88	      const { data: { session } } = await sb.auth.getSession();
89	      if (!session) { window.location.replace('login.html'); return; }
90	      loadProjects();
91	    })();
92	
93	    document.getElementById('logoutBtn').addEventListener('click', async () => {
94	      await sb.auth.signOut(); window.location.replace('login.html');
95	    });
96	
97	    async function loadProjects() {
98	      const { data: projects } = await sb.from('projects').select('*').order('created_at');
99	      const { data: counts } = await sb.from('documents').select('project_id');
100	      const countMap = {};
101	      (counts || []).forEach(d => { countMap[d.project_id] = (countMap[d.project_id] || 0) + 1; });
102	
103	      const grid = document.getElementById('grid');
104	      const icons = ['📊','📈','📉','🗂️','📋','📌','🔍','💡'];
105	      const cards = (projects || []).map((p, i) => `
106	        <div class="project-card" onclick="openProject('${p.id}')">
107	          <div class="project-actions">
108	            <button class="action-btn" onclick="event.stopPropagation(); editProject('${p.id}','${p.name.replace(/'/g,"\\'")}','${(p.description||'').replace(/'/g,"\\'")}')">Edit</button>
109	            <button class="action-btn" onclick="event.stopPropagation(); deleteProject('${p.id}')">Delete</button>
110	          </div>
111	          <div class="project-icon">${icons[i % icons.length]}</div>
112	          <div class="project-name">${p.name}</div>
113	          <div class="project-desc">${p.description || 'No description'}</div>
114	          <div class="project-meta">
115	            <span>${countMap[p.id] || 0} file${countMap[p.id] !== 1 ? 's' : ''}</span>
116	            <span>${new Date(p.created_at).toLocaleDateString()}</span>
117	          </div>
118	        </div>`).join('');
119	
120	      grid.innerHTML = `
121	        <button class="new-card" id="newBtn">
122	          <div class="plus">+</div>
123	          <div class="label">New Project</div>
124	        </button>
125	        ${cards}`;
126	      document.getElementById('newBtn').addEventListener('click', () => openModal());
127	    }
128	
129	    function openProject(id) { window.location.href = `upload.html?project=${id}`; }
130	
131	    function openModal(id = null, name = '', desc = '') {
132	      editingId = id;
133	      document.getElementById('modalTitle').textContent = id ? 'Edit Project' : 'New Project';
134	      document.getElementById('modalSave').textContent = id ? 'Save Changes' : 'Create Project';
135	      document.getElementById('projName').value = name;
136	      document.getElementById('projDesc').value = desc;
137	      document.getElementById('modalOverlay').classList.add('open');
138	      setTimeout(() => document.getElementById('projName').focus(), 50);
139	    }
140	
141	    function editProject(id, name, desc) { openModal(id, name, desc); }
142	
143	    document.getElementById('modalCancel').addEventListener('click', () => {
144	      document.getElementById('modalOverlay').classList.remove('open'); editingId = null;
145	    });
146	
147	    document.getElementById('modalSave').addEventListener('click', async () => {
148	      const name = document.getElementById('projName').value.trim();
149	      const description = document.getElementById('projDesc').value.trim();
150	      if (!name) return;
151	      if (editingId) {
152	        await sb.from('projects').update({ name, description }).eq('id', editingId);
153	      } else {
154	        await sb.from('projects').insert({ name, description });
155	      }
156	      document.getElementById('modalOverlay').classList.remove('open');
157	      editingId = null;
158	      loadProjects();
159	    });
160	
161	    document.getElementById('projName').addEventListener('keydown', e => {
162	      if (e.key === 'Enter') document.getElementById('modalSave').click();
163	    });
164	
165	    async function deleteProject(id) {
166	      if (!confirm('Delete this project and all its files?')) return;
167	      await sb.from('projects').delete().eq('id', id);
168	      loadProjects();
169	    }
170	  </script>
171	</body>
172	</html>
